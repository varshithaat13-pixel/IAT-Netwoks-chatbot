<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAT Networks | Front Desk Assistant</title>
    <style>
        :root {
            --primary-color: #0c4a6e;
            --secondary-color: #075985;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg-bg: #0c4a6e;
            --bot-msg-bg: #f1f5f9;
            --text-main: #1e293b;
            --text-light: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            margin: 20px;
            position: relative;
        }

        header {
            padding: 1.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
        }

        #message-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        .bot-message .source-tag {
            display: block;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-light);
            font-style: italic;
        }

        #loading-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-light);
            border-radius: 50%;
            margin-right: 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }

        .input-area {
            padding: 1.5rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: var(--secondary-color);
        }

        #send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #send-btn:hover {
            background-color: var(--secondary-color);
        }

        #send-btn:disabled {
            background-color: var(--text-light);
            cursor: not-allowed;
        }

        .error-message {
            background-color: #fee2e2;
            color: #b91c1c;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
            margin: 0 1.5rem 1rem;
            border-radius: 6px;
            display: none;
        }

        /* Markdown-like formatting support */
        .bot-message p {
            margin-bottom: 8px;
        }

        .bot-message ul {
            margin-left: 1.5rem;
            margin-bottom: 8px;
        }

        .bot-message li {
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <div id="chat-container">
        <header>
            <div style="flex: 1;">
                <h1>IAT Networks</h1>
                <p><span class="status-dot"></span> Front Desk Assistant</p>
            </div>
        </header>

        <div id="message-area">
            <div class="message bot-message">
                Hello! I am the IAT Networks Front Desk Assistant. How can I help you today?
            </div>
        </div>

        <div id="error-box" class="error-message"></div>

        <div id="loading-indicator">
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <form class="input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const messageArea = document.getElementById('message-area');
        const loadingIndicator = document.getElementById('loading-indicator');
        const errorBox = document.getElementById('error-box');
        const sendBtn = document.getElementById('send-btn');

        const API_URL = 'https://iat-netwoks-chatbot.onrender.com/chat';

        function appendMessage(text, role, sources = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;

            // Format bullet points if present
            let formattedText = text.replace(/\n\* /g, '<br>• ').replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;

            /* 
            if (sources.length > 0) {
                const sourceDiv = document.createElement('span');
                sourceDiv.className = 'source-tag';
                const sectionNames = Array.from(new Set(sources.map(s => s.section.replace('_', ' '))));
                sourceDiv.innerText = `Knowledge Source: ${sectionNames.join(', ')}`;
                msgDiv.appendChild(sourceDiv);
            }
            */

            messageArea.appendChild(msgDiv);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 5000);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const query = userInput.value.strip ? userInput.value.strip() : userInput.value.trim();
            if (!query) return;

            // Clear input and show message
            userInput.value = '';
            appendMessage(query, 'user');

            // Show loading
            loadingIndicator.style.display = 'block';
            messageArea.scrollTop = messageArea.scrollHeight;
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();

                // Hide loading
                loadingIndicator.style.display = 'none';

                // Display bot message
                appendMessage(data.answer, 'bot', data.sources);

            } catch (error) {
                loadingIndicator.style.display = 'none';
                showError("I'm sorry, I'm having trouble connecting to the server. Please ensure the backend is running.");
                console.error('Chat Error:', error);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        // Focus input on load
        window.onload = () => userInput.focus();
    </script>
</body>

</html>
